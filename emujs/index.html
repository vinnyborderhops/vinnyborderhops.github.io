<!DOCTYPE html>
<html>

<head>
    <title>EmulatorJS</title>

    <link rel=icon href=https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@latest/docs/favicon.ico sizes="16x16 32x32 48x48 64x64" type=image/vnd.microsoft.icon>
    <meta name=viewport content="width = device-width, initial-scale = 1">

    <link rel="stylesheet" href="./style.css"/>
</head>

<body>
    <div id=box>
        <input type=file id=input>
        Drag ROM file or click here
    </div>

    <script>
        input.onchange = async () => {
            const url = new Blob([input.files[0]])
            const parts = input.files[0].name.split(".")

            const core = await (async (ext) => {
                if (["fds", "nes", "unif", "unf"].includes(ext))
                    return "nes"

                if (["smc", "fig", "sfc", "gd3", "gd7", "dx2", "bsx", "swc"].includes(ext))
                    return "snes"

                if (["z64", "n64"].includes(ext))
                    return "n64"

                if (["pce"].includes(ext))
                    return "pce"

                if (["ngp", "ngc"].includes(ext))
                    return "ngp"

                if (["ws", "wsc"].includes(ext))
                    return "ws"

                if (["col", "cv"].includes(ext))
                    return "coleco"

                if (["nds", "gba", "gb", "z64", "n64"].includes(ext))
                    return ext

                return await new Promise(resolve => {
                    const cores = {
                        "Nintendo 64": "n64",
                        "Nintendo Game Boy": "gb",
                        "Nintendo Game Boy Advance": "gba",
                        "Nintendo DS": "nds",
                        "Nintendo Entertainment System": "nes",
                        "Super Nintendo Entertainment System": "snes",
                        "PlayStation": "psx",
                        "Virtual Boy": "vb",
                        "Sega Mega Drive": "segaMD",
                        "Sega Master System": "segaMS",
                        "Sega CD": "segaCD",
                        "Atari Lynx": "lynx",
                        "Sega 32X": "sega32x",
                        "Atari Jaguar": "jaguar",
                        "Sega Game Gear": "segaGG",
                        "Sega Saturn": "segaSaturn",
                        "Atari 7800": "atari7800",
                        "Atari 2600": "atari2600",
                        "NEC TurboGrafx-16/SuperGrafx/PC Engine": "pce",
                        "NEC PC-FX": "pcfx",
                        "SNK NeoGeo Pocket (Color)": "ngp",
                        "Bandai WonderSwan (Color)": "ws",
                        "ColecoVision": "coleco"
                    }

                    const button = document.createElement("button")
                    const select = document.createElement("select")

                    for (const type in cores) {
                        const option = document.createElement("option")

                        option.value = cores[type]
                        option.textContent = type
                        select.appendChild(option)
                    }

                    button.onclick = () => resolve(select[select.selectedIndex].value)
                    button.textContent = "Load game"
                    box.innerHTML = ""

                    box.appendChild(select)
                    box.appendChild(button)
                })
            })(parts.pop())

            const div = document.createElement("div")
            const sub = document.createElement("div")
            const script = document.createElement("script")

            sub.id = "game"
            div.id = "display"

            box.remove()
            div.appendChild(sub)
            document.body.appendChild(div)

            window.EJS_player = "#game";
            window.EJS_gameName = parts.shift();
            window.EJS_biosUrl = "";
            window.EJS_gameUrl = url;
            window.EJS_core = core;
            window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@latest/data/";
            window.EJS_startOnLoaded = true;

            script.src = "https://cdn.jsdelivr.net/gh/emulatorjs/emulatorjs@latest/data/loader.js";
            document.body.appendChild(script);
        }
        box.ondragover = () => box.setAttribute("drag", true);
        box.ondragleave = () => box.removeAttribute("drag");
    </script>
</body>

</html>
